plugins {
    id "com.android.application"
}

android {
    namespace "com.airundown.reader"
    compileSdk 35

    defaultConfig {
        applicationId "com.airundown.reader"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
