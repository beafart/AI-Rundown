name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Inject app defaults
        env:
          APP_SUPABASE_URL: ${{ secrets.APP_SUPABASE_URL }}
          APP_SUPABASE_ANON_KEY: ${{ secrets.APP_SUPABASE_ANON_KEY }}
        run: |
          python - <<'PY'
          import os
          import xml.sax.saxutils as x
          values_dir = "mobile/android/app/src/main/res/values"
          os.makedirs(values_dir, exist_ok=True)
          url = os.environ.get("APP_SUPABASE_URL", "")
          anon = os.environ.get("APP_SUPABASE_ANON_KEY", "")
          xml = f'''<resources>
              <string name="app_name">AI Rundown</string>
              <string name="default_supabase_url">{x.escape(url)}</string>
              <string name="default_supabase_anon_key">{x.escape(anon)}</string>
          </resources>
          '''
          with open(os.path.join(values_dir, "strings.xml"), "w", encoding="utf-8") as f:
              f.write(xml)
          PY

      - name: Build debug APK
        working-directory: mobile/android
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ai-rundown-reader-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish latest APK release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-apk --yes --cleanup-tag || true
          gh release create latest-apk \
            mobile/android/app/build/outputs/apk/debug/app-debug.apk \
            --title "Latest Android APK" \
            --notes "Debug APK for personal installation. Download app-debug.apk on your Android phone."
